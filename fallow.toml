# Fallow configuration

# Build artifacts and non-JS assets — not source code
ignorePatterns = [
  "src-tauri/frontend-dist/**",
  "target/**",
  "src/styles/main.css",
]

# Test helpers are consumed by test files, not tracked by fallow
ignoreExports = [
  { file = "src/test/helpers.ts", exports = ["registeredHandlers", "createDom", "mockTauriApi"] },
]
